services:
  ejabberd:
    image: ejabberd/ecs
    container_name: ejabberd
    ports:
      - 5222:5222
      - 5269:5269
      - 5280:5280
    volumes:
      - ./conf:/opt/ejabberd/conf/
      - ./database:/opt/ejabberd/database/
      - ./logs:/opt/ejabberd/logs/
      - ./upload:/opt/ejabberd/upload/
    environment:
      - EJABBERD_MACRO_ADMIN=email
      - EJABBERD_MACRO_HOST=host
      - REGISTER_ADMIN_PASSWORD=pass
